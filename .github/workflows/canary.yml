name: Canary

on:
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Export a public tour against the live komoot API
        run: |
          uv run komootloose 123456 -o canary.gpx
          head -2 canary.gpx
          grep -c "<rtept" canary.gpx
      - name: Reset GitHub's 60-day scheduled-workflow timer
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X PUT "repos/${{ github.repository }}/actions/workflows/canary.yml/enable"
