name: Pages

on:
  push:
    branches: [main, web]
    paths: ["web/**", ".github/workflows/pages.yml"]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp the deployed commit into the footer
        run: sed -i "s/__SHA__/${GITHUB_SHA::7}/g" web/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - uses: actions/deploy-pages@v4
        id: deployment
